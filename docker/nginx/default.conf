server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ $uri/index.html /index.html;
  }

  location = /404.html {
    internal;
  }

  error_page 404 /404.html;

  location ~* \.(css|js|mjs|json|xml|txt|map|ico|png|jpg|jpeg|gif|svg|webp|woff|woff2)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    access_log off;
  }
}
